{% load wagtailimages_tags %}
<section class="hero-banner-premium">
    {% if value.background_image %}
        {% image value.background_image original as bg_img %}
        <div class="hero-bg-media" style="background-image: url('{{ bg_img.url }}');"></div>
    {% endif %}
    <div class="hero-overlay-gradient"></div>
    
    <div class="container position-relative z-index-2 h-100">
        <div class="row h-100 align-items-center">
            <div class="col-lg-8">
                <div class="hero-content">
                    <div class="hero-badge-container mb-4">
                        <span class="badge-premium animate-fade-in">
                            <span class="live-pulse"></span>
                            Clinical Excellence 24/7
                        </span>
                    </div>
                    
                    <h1 class="display-huge fw-black mb-4">{{ value.title }}</h1>
                    
                    {% if value.subtitle %}
                        <p class="hero-description lead fw-light mb-5">{{ value.subtitle }}</p>
                    {% endif %}
                    
                    {% if value.cta_button %}
                        <div class="hero-actions d-flex gap-4 animate-slide-up">
                            <a href="{{ value.cta_button.link }}" class="hero-action-portal">
                                <span class="cta-text">{{ value.cta_button.text }}</span>
                                <span class="cta-icon-box">
                                    <i class="fas fa-arrow-right"></i>
                                </span>
                            </a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</section>
