{% load wagtailimages_tags %}
<section class="hero-banner-premium">
    {% if value.background_image %}
        {% image value.background_image original as bg_img %}
        <div class="hero-bg-media" style="background-image: url('{{ bg_img.url }}');"></div>
    {% endif %}
    <div class="hero-overlay-gradient"></div>
    
    <div class="container position-relative z-index-2 h-100">
        <div class="row h-100 align-items-center">
            <div class="col-lg-8">
                <div class="hero-content">
                    <span class="badge-premium mb-3 animate-fade-in">Clinical Excellence 24/7</span>
                    <h1 class="display-huge fw-black mb-4">{{ value.title }}</h1>
                    {% if value.subtitle %}
                        <p class="lead fw-light mb-5">{{ value.subtitle }}</p>
                    {% endif %}
                    {% if value.cta_button %}
                        <div class="hero-actions d-flex gap-4 animate-slide-up">
                            <a href="{{ value.cta_button.link }}" class="btn btn-primary btn-xl rounded-pill px-5 shadow-premium">
                                {{ value.cta_button.text }} <i class="fas fa-chevron-right ms-3"></i>
                            </a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</section>
