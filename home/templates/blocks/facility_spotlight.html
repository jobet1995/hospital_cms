{% load wagtailimages_tags %}

<section class="facility-spotlight py-5">
    <div class="container">
        <div class="row mb-5 align-items-center">
            <div class="col-lg-6">
                <h2 class="display-5 fw-bold mb-3">{{ value.title }}</h2>
                <div class="section-divider mb-4" style="width: 80px; height: 5px; background: #3498db; border-radius: 2px;"></div>
                <p class="lead text-muted">{{ value.description }}</p>
            </div>
        </div>
        
        <div class="row g-4">
            {% for facility in value.facilities %}
                <div class="col-lg-6">
                    <div class="facility-item d-flex flex-column flex-md-row bg-white rounded-5 shadow-premium overflow-hidden border-0 h-100 transition-all hover-glow">
                        <div class="facility-image-col col-md-5">
                            {% image facility.image fill-500x500 as f_img %}
                            <div class="h-100 w-100 h-250-mobile" style="background: url('{{ f_img.url }}') center/cover no-repeat;"></div>
                        </div>
                        <div class="facility-content-col col-md-7 p-4 d-flex flex-column">
                            <h4 class="fw-bold mb-2">{{ facility.name }}</h4>
                            <p class="text-muted small flex-grow-1">{{ facility.details }}</p>
                            <div class="mt-3">
                                <span class="badge rounded-pill bg-light text-primary border border-primary px-3 py-1">Advanced Technology</span>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>

<style>
    .hover-glow:hover {
        box-shadow: 0 0 30px rgba(52, 152, 219, 0.2) !important;
        transform: scale(1.02);
    }
    @media (max-width: 767px) {
        .h-250-mobile { height: 250px !important; }
    }
</style>
